<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitrum Hub - Live Prices</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Arbitrum Hub</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html"><span>Home</span></a></li>
                <li><a href="concepts.html"><span>Concepts</span></a></li>
                <li><a href="prices.html" class="active"><span>Live Prices</span></a></li>
                <li><a href="simulator.html"><span>Block Simulator</span></a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                    <span class="toggle-track">
                        <span class="toggle-thumb">
                            <span class="toggle-icon sun">☀️</span>
                            <span class="toggle-icon moon">🌙</span>
                        </span>
                    </span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Toggle Menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Live Crypto Prices</h1>
            <p>Real-time prices fetched from CoinGecko — no API key required</p>
        </div>
    </section>

    <!-- Prices Section -->
    <section class="prices-section">
        <div class="container">
            <div class="prices-controls">
                <p id="last-updated">Last updated: —</p>
                <button class="refresh-btn" id="refresh-btn" onclick="fetchPrices()">
                    <span id="refresh-icon">🔄</span> Refresh Prices
                </button>
            </div>

            <!-- Price Cards Grid -->
            <div class="prices-grid" id="prices-grid">
                <!-- Skeleton loaders shown on first load -->
                <div class="price-card-skeleton">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                </div>
                <div class="price-card-skeleton">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                </div>
                <div class="price-card-skeleton">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                </div>
                <div class="price-card-skeleton">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                </div>
                <div class="price-card-skeleton">
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Built by <strong>Rishita Bhuva</strong> | Arbitrum Builder Pods - LamprosDAO</p>
            <p>
                <a href="https://github.com/Rishita2310/arbitrum-web3-site" target="_blank" class="footer-link">
                    GitHub Repository
                </a>
            </p>
        </div>
    </footer>

    <script src="js/prices.js"></script>

    <script>
        const html = document.documentElement;
        const navbar = document.getElementById("navbar");
        const themeToggle = document.getElementById("themeToggle");
        const hamburger = document.getElementById("hamburger");
        const navLinks = document.getElementById("navLinks");
        const navOverlay = document.getElementById("navOverlay");
        const savedTheme = localStorage.getItem("theme") || "dark";
        html.setAttribute("data-theme", savedTheme);
        themeToggle.setAttribute("data-theme", savedTheme);
        themeToggle.addEventListener("click", () => {
            const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
            html.setAttribute("data-theme", next);
            themeToggle.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
        });
        window.addEventListener("scroll", () => {
            navbar.classList.toggle("scrolled", window.scrollY > 20);
        });
        function toggleMenu(open) {
            hamburger.classList.toggle("open", open);
            navLinks.classList.toggle("open", open);
            navOverlay.classList.toggle("open", open);
            hamburger.setAttribute("aria-expanded", open);
            document.body.style.overflow = open ? "hidden" : "";
        }
        hamburger.addEventListener("click", () => toggleMenu(!navLinks.classList.contains("open")));
        navOverlay.addEventListener("click", () => toggleMenu(false));
        navLinks.querySelectorAll("a").forEach(l => l.addEventListener("click", () => toggleMenu(false)));
    </script>
</body>
</html>
